<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF Viewer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e13;
      color: #d9e7f5;
      font-family: Arial, sans-serif;
    }
    .stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0e13;
    }
    canvas {
      max-width: 100%;
      max-height: 100%;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.45);
      background: white;
    }
    .message {
      padding: 16px;
      text-align: center;
      font-size: 14px;
      color: #d9e7f5;
    }
  </style>
</head>
<body>
  <div id="stage" class="stage">
    <div id="msg" class="message">Loading PDF...</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      const pageNo = Math.max(1, Number(params.get("page") || "1"));
      const fallbackUrl = file
        ? `https://mozilla.github.io/pdf.js/web/viewer.html?file=${encodeURIComponent(file)}#page=${pageNo}&zoom=page-fit`
        : "";

      function goFallback() {
        if (!fallbackUrl) return;
        window.location.replace(fallbackUrl);
      }

      // If CDN script is blocked/unavailable on device network, fail over quickly.
      setTimeout(function () {
        if (!window.pdfjsLib) {
          goFallback();
        }
      }, 1400);

      try {
        if (!window.pdfjsLib) {
          document.getElementById("msg").textContent = "PDF engine not available. Opening fallback...";
          goFallback();
          return;
        }

        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        if (!file) {
          document.getElementById("msg").textContent = "Missing PDF file URL.";
          return;
        }

        const stage = document.getElementById("stage");
        const msg = document.getElementById("msg");

        pdfjsLib.getDocument({ url: file }).promise
          .then((pdf) => pdf.getPage(Math.min(pageNo, pdf.numPages)))
          .then((page) => {
            const viewport = page.getViewport({ scale: 1 });
            const scale = Math.min(
              window.innerWidth / viewport.width,
              window.innerHeight / viewport.height
            );
            const finalViewport = page.getViewport({ scale: Math.max(scale, 0.25) });

            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.width = Math.floor(finalViewport.width);
            canvas.height = Math.floor(finalViewport.height);

            stage.innerHTML = "";
            stage.appendChild(canvas);

            return page.render({
              canvasContext: context,
              viewport: finalViewport,
            }).promise;
          })
          .catch((err) => {
            msg.textContent = "Unable to render PDF. Opening fallback...";
            console.error("PDF render error:", err);
            goFallback();
          });
      } catch (e) {
        const msg = document.getElementById("msg");
        if (msg) msg.textContent = "Unexpected PDF viewer error. Opening fallback...";
        goFallback();
      }
    })();
  </script>
</body>
</html>
